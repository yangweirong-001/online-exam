    // ----- 工具：判断选项是否匹配正确答案 -----
    function isOptionCorrect(optionText, answerKey) {
        // 如果选项文本以 "A." "B." "C." "D." 开头，取第一个字符比较
        const match = optionText.match(/^([A-D])[.、]\s*/);
        if (match) {
            return match[1] === answerKey;
        }
        // 否则直接比较
        return optionText === answerKey;
    }

    // ----- 获取正确答案的完整文本 -----
    function getFullAnswerText(options, answerKey) {
        for (let opt of options) {
            const match = opt.match(/^([A-D])[.、]\s*/);
            if (match && match[1] === answerKey) {
                return opt;
            }
            if (opt === answerKey) return opt;
        }
        return answerKey; // fallback
    }

    function getFilteredDialogues() {
        if (currentFilter === 'all') return dialogues;
        return dialogues.filter(d => d.paper === currentFilter);
    }

    function getFilteredOthers() {
        if (currentFilter === 'all') return otherQuestions;
        return otherQuestions.filter(q => q.paper === currentFilter);
    }

    function renderAll() {
        container.innerHTML = '';
        const dList = getFilteredDialogues();
        const oList = getFilteredOthers();

        // ---- 对话 ----
        dList.forEach((dialogue) => {
            const block = document.createElement('div');
            block.className = 'dialogue-block unanswered';
            block.id = `dialogue-${dialogue.id}`;

            const title = document.createElement('div');
            title.className = 'dialogue-title';
            title.textContent = `${dialogue.title}`;
            block.appendChild(title);

            const textDiv = document.createElement('div');
            textDiv.className = 'dialogue-text';
            let html = dialogue.text;
            dialogue.blanks.forEach(b => {
                const placeholder = `___${b.id}___`;
                const sel = dialogueSelections[dialogue.id]?.[b.id];
                let cls = 'blank';
                if (sel) {
                    const isCorrect = isOptionCorrect(sel, b.answer);
                    cls += isCorrect ? ' filled' : ' filled-wrong';
                }
                const displayText = sel || `___${b.id}___`;
                html = html.replace(placeholder, `<span class="${cls}" id="blank-${dialogue.id}-${b.id}">${displayText}</span>`);
            });
            textDiv.innerHTML = html.replace(/\n/g, '<br>');
            block.appendChild(textDiv);

            const selectorDiv = document.createElement('div');
            selectorDiv.className = 'blank-selector';
            dialogue.blanks.forEach(b => {
                const item = document.createElement('div');
                item.className = 'blank-item';
                const label = document.createElement('label');
                label.textContent = `___${b.id}___`;
                const select = document.createElement('select');
                select.id = `sel-${dialogue.id}-${b.id}`;
                const defaultOpt = document.createElement('option');
                defaultOpt.value = '';
                defaultOpt.textContent = '-- 请选择 --';
                select.appendChild(defaultOpt);
                b.options.forEach(opt => {
                    const op = document.createElement('option');
                    op.value = opt;
                    op.textContent = opt;
                    select.appendChild(op);
                });
                if (dialogueSelections[dialogue.id]?.[b.id]) {
                    select.value = dialogueSelections[dialogue.id][b.id];
                }
                select.addEventListener('change', function() {
                    if (!dialogueSelections[dialogue.id]) dialogueSelections[dialogue.id] = {};
                    dialogueSelections[dialogue.id][b.id] = this.value;
                    updateDialogueDisplay(dialogue.id);
                    const fb = document.getElementById(`fb-${dialogue.id}`);
                    if (fb) {
                        fb.className = 'feedback-dialogue';
                        fb.innerHTML = '';
                    }
                    block.classList.remove('correct', 'wrong');
                    block.classList.add('unanswered');
                    updateProgress();
                });
                item.appendChild(label);
                item.appendChild(select);
                selectorDiv.appendChild(item);
            });
            block.appendChild(selectorDiv);

            const checkBtn = document.createElement('button');
            checkBtn.className = 'btn-check';
            checkBtn.textContent = '✅ 检查本对话答案';
            checkBtn.addEventListener('click', function() {
                checkDialogue(dialogue.id);
            });
            block.appendChild(checkBtn);

            const fb = document.createElement('div');
            fb.className = 'feedback-dialogue';
            fb.id = `fb-${dialogue.id}`;
            block.appendChild(fb);

            container.appendChild(block);
        });

        // ---- 其他题型 ----
        oList.forEach((q, idx) => {
            const block = document.createElement('div');
            block.className = 'other-block unanswered';
            block.id = `q-${q.id}`;

            const title = document.createElement('div');
            title.className = 'q-title';
            const typeSpan = document.createElement('span');
            typeSpan.className = 'q-type';
            typeSpan.textContent = q.type;
            title.appendChild(typeSpan);
            title.innerHTML += ` ${idx+1}. ${q.question}`;

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';

            if (q.type === '写作') {
                const note = document.createElement('div');
                note.className = 'writing-hint';
                note.innerHTML = q.answer;
                optionsDiv.appendChild(note);
                block.classList.remove('unanswered');
                block.classList.add('correct');
            } else if (q.options && q.options.length > 0) {
                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = q.id;
                    radio.value = opt;
                    if (otherSelections[q.id] === opt) {
                        radio.checked = true;
                        label.classList.add('selected');
                    }
                    radio.addEventListener('change', function() {
                        if (this.checked) {
                            handleOtherSelect(q.id, opt);
                        }
                    });
                    label.appendChild(radio);
                    label.append(opt);
                    optionsDiv.appendChild(label);
                });
            }

            const feedback = document.createElement('div');
            feedback.className = 'feedback';
            feedback.id = `fb-${q.id}`;
            if (otherSelections[q.id] && q.type !== '写作') {
                const isCorrect = isOptionCorrect(otherSelections[q.id], q.answer);
                showOtherFeedback(q.id, isCorrect);
            }

            block.appendChild(title);
            block.appendChild(optionsDiv);
            block.appendChild(feedback);
            container.appendChild(block);
        });

        updateProgress();
    }

    function updateDialogueDisplay(dialogueId) {
        const dialogue = dialogues.find(d => d.id === dialogueId);
        if (!dialogue) return;
        const sel = dialogueSelections[dialogueId] || {};
        dialogue.blanks.forEach(b => {
            const span = document.getElementById(`blank-${dialogueId}-${b.id}`);
            if (span) {
                const val = sel[b.id];
                let cls = 'blank';
                if (val) {
                    const isCorrect = isOptionCorrect(val, b.answer);
                    cls += isCorrect ? ' filled' : ' filled-wrong';
                }
                span.className = cls;
                span.textContent = val || `___${b.id}___`;
            }
            const select = document.getElementById(`sel-${dialogueId}-${b.id}`);
            if (select) {
                select.className = '';
                const val = sel[b.id];
                if (val) {
                    const isCorrect = isOptionCorrect(val, b.answer);
                    select.classList.add(isCorrect ? 'correct' : 'wrong');
                }
            }
        });
    }

    function checkDialogue(dialogueId) {
        const dialogue = dialogues.find(d => d.id === dialogueId);
        if (!dialogue) return;
        const sel = dialogueSelections[dialogueId] || {};
        let allFilled = true;
        let correctCount = 0;
        let total = dialogue.blanks.length;

        dialogue.blanks.forEach(b => {
            if (!sel[b.id]) allFilled = false;
            else if (isOptionCorrect(sel[b.id], b.answer)) correctCount++;
        });

        const fb = document.getElementById(`fb-${dialogueId}`);
        const block = document.getElementById(`dialogue-${dialogueId}`);

        if (!allFilled) {
            fb.className = 'feedback-dialogue show wrong';
            fb.innerHTML = '⚠️ 请先完成所有空的选择再检查答案。';
            block.classList.remove('correct', 'wrong', 'unanswered');
            block.classList.add('unanswered');
            return;
        }

        const allCorrect = correctCount === total;
        fb.className = `feedback-dialogue show ${allCorrect ? 'correct' : 'wrong'}`;
        block.classList.remove('unanswered', 'correct', 'wrong');
        block.classList.add(allCorrect ? 'correct' : 'wrong');

        let detailHtml = '';
        dialogue.blanks.forEach(b => {
            const isCorrect = isOptionCorrect(sel[b.id], b.answer);
            const status = isCorrect ? '✅' : '❌';
            const fullAnswer = getFullAnswerText(b.options, b.answer);
            detailHtml += `<div class="${isCorrect ? 'ok' : 'fail'}">${status} ___${b.id}___ → 你的选择：${sel[b.id]} ${isCorrect ? '' : '（正确答案：' + fullAnswer + '）'}</div>`;
        });
        fb.innerHTML = `
            <div>${allCorrect ? '🎉 全部正确！' : `❌ 有 ${total - correctCount} 个空填错了。`}</div>
            <div class="detail">${detailHtml}</div>
        `;

        updateDialogueDisplay(dialogueId);
        updateProgress();
    }

    function handleOtherSelect(qId, selected) {
        otherSelections[qId] = selected;
        const isCorrect = isOptionCorrect(selected, otherQuestions.find(q => q.id === qId)?.answer || '');
        showOtherFeedback(qId, isCorrect);

        const block = document.getElementById(`q-${qId}`);
        block.classList.remove('unanswered', 'correct', 'wrong');
        block.classList.add(isCorrect ? 'correct' : 'wrong');

        const labels = block.querySelectorAll('.option-label');
        const q = otherQuestions.find(q => q.id === qId);
        labels.forEach(label => {
            const radio = label.querySelector('input[type="radio"]');
            const val = radio.value;
            label.classList.remove('selected', 'correct-answer', 'wrong-answer');
            if (val === selected) {
                label.classList.add('selected');
                if (isCorrect) label.classList.add('correct-answer');
                else label.classList.add('wrong-answer');
            }
            if (q && q.options && q.answer) {
                const fullCorrect = getFullAnswerText(q.options, q.answer);
                if (fullCorrect && val === fullCorrect) {
                    label.classList.add('correct-answer');
                }
                // 如果选项以字母开头，匹配前缀
                const match = val.match(/^([A-Da-d])[.、]\s*/);
                if (match && match[1].toUpperCase() === q.answer) {
                    label.classList.add('correct-answer');
                }
            }
        });
        updateProgress();
    }

    function showOtherFeedback(qId, isCorrect) {
        const q = otherQuestions.find(q => q.id === qId);
        const fb = document.getElementById(`fb-${qId}`);
        if (!fb || q.type === '写作') return;
        fb.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;
        let correctDisplay = '';
        if (!isCorrect && q) {
            const fullAnswer = getFullAnswerText(q.options, q.answer);
            correctDisplay = `<span class="correct-ans">正确答案：${fullAnswer}</span>`;
        }
        fb.innerHTML = isCorrect ? '✅ 回答正确！' : `❌ 回答错误。${correctDisplay}`;
    }

    function updateProgress() {
        const dList = getFilteredDialogues();
        const oList = getFilteredOthers();

        let total = 0, answered = 0;

        dList.forEach(d => {
            total++;
            const sel = dialogueSelections[d.id] || {};
            const allFilled = d.blanks.every(b => sel[b.id] && sel[b.id] !== '');
            if (allFilled) answered++;
        });

        oList.forEach(q => {
            total++;
            if (q.type === '写作') { answered++; return; }
            if (otherSelections[q.id]) answered++;
        });

        const pct = total ? (answered / total * 100) : 0;
        progressBar.style.width = `${pct}%`;
        progressText.textContent = `${answered} / ${total} 题`;

        let correct = 0, wrong = 0;

        dList.forEach(d => {
            const sel = dialogueSelections[d.id] || {};
            const allFilled = d.blanks.every(b => sel[b.id] && sel[b.id] !== '');
            if (allFilled) {
                const allCorrect = d.blanks.every(b => isOptionCorrect(sel[b.id], b.answer));
                if (allCorrect) correct++;
                else wrong++;
            }
        });

        oList.forEach(q => {
            if (q.type === '写作') return;
            const ans = otherSelections[q.id];
            if (ans) {
                if (isOptionCorrect(ans, q.answer)) correct++;
                else wrong++;
            }
        });

        correctCountEl.textContent = `✅ 正确 ${correct}`;
        wrongCountEl.textContent = `❌ 错误 ${wrong}`;
    }

    function resetAll() {
        dialogueSelections = {};
        otherSelections = {};
        document.querySelectorAll('select').forEach(s => s.value = '');
        document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
        renderAll();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.querySelectorAll('.tabs button').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.paper;
            dialogueSelections = {};
            otherSelections = {};
            renderAll();
        });
    });

    renderAll();

    document.getElementById('resetBtn').addEventListener('click', resetAll);
    document.getElementById('scrollToTopBtn').addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
</script>
