<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经济学 · 在线答题</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #f4f7fb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            padding: 30px 35px;
        }
        h1 {
            font-size: 26px;
            color: #1a2634;
            border-left: 5px solid #2b7be4;
            padding-left: 16px;
            margin-bottom: 6px;
        }
        .sub {
            color: #6b7a8a;
            font-size: 14px;
            margin-bottom: 24px;
            padding-left: 21px;
        }
        .progress-wrap {
            background: #e9eef3;
            border-radius: 40px;
            height: 10px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2b7be4, #6ea8f7);
            border-radius: 40px;
            transition: width 0.3s ease;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #2c3e50;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 8px 16px;
        }
        .stats span { background: #f0f4fa; padding: 4px 14px; border-radius: 30px; }
        .stats .right { color: #1e7e34; }
        .stats .wrong { color: #b33c3c; }

        .question-block {
            background: #fafcff;
            border: 1px solid #e2e9f2;
            border-radius: 18px;
            padding: 22px 26px;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .question-block.correct { border-left: 6px solid #2a9d8f; background: #f2fcf9; }
        .question-block.wrong { border-left: 6px solid #e76f51; background: #fdf5f2; }
        .question-block.unanswered { border-left: 6px solid #d0d9e6; }

        .q-title {
            font-weight: 600;
            font-size: 16px;
            color: #1a2634;
            margin-bottom: 10px;
        }
        .q-type {
            display: inline-block;
            background: #dce4ef;
            font-size: 11px;
            padding: 0 10px;
            border-radius: 30px;
            color: #2c3e50;
            margin-right: 10px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 6px;
        }
        .option-label {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f2f6fc;
            padding: 10px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.15s;
            border: 1.5px solid transparent;
            font-size: 15px;
        }
        .option-label:hover { background: #e6edf7; }
        .option-label input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #2b7be4;
            flex-shrink: 0;
        }
        .option-label.selected { border-color: #2b7be4; background: #e5effb; }
        .option-label.correct-answer { border-color: #2a9d8f; background: #d4f3ed; }
        .option-label.wrong-answer { border-color: #e76f51; background: #fce4dd; }

        .feedback {
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            display: none;
            background: #f0f4fa;
        }
        .feedback.show { display: block; }
        .feedback.correct { background: #ddf5f0; color: #146b5f; }
        .feedback.wrong { background: #fce8e2; color: #a3432b; }
        .feedback .correct-ans { font-weight: 600; color: #1a6b5c; }

        .actions {
            display: flex;
            gap: 16px;
            justify-content: space-between;
            flex-wrap: wrap;
            margin: 28px 0 10px;
        }
        .btn {
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            background: #e2e9f2;
            color: #1f2a36;
        }
        .btn-primary { background: #1f3a5f; color: white; }
        .btn-primary:hover { background: #142b47; }
        .btn-outline { background: transparent; border: 1.5px solid #b8c9dd; }
        .btn-outline:hover { background: #eef3f9; }
        .btn-danger { background: #d95b43; color: white; }
        .btn-danger:hover { background: #be4a34; }

        .footer-note {
            font-size: 13px;
            color: #7f8fa3;
            text-align: center;
            margin-top: 18px;
            border-top: 1px solid #e9eff5;
            padding-top: 18px;
        }
        @media (max-width: 640px) {
            .container { padding: 16px; }
            .question-block { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1>📘 经济学 · 试题汇编</h1>
    <div class="sub">名词解释 · 单选 · 判断 · 简答 · 计算 · 分析（含参考答案）</div>

    <!-- 进度条 -->
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="stats">
        <span id="progressText">0 / 0 题</span>
        <span class="right" id="correctCount">✅ 正确 0</span>
        <span class="wrong" id="wrongCount">❌ 错误 0</span>
    </div>

    <!-- 题目容器 -->
    <div id="questionsContainer"></div>

    <div class="actions">
        <button class="btn btn-outline" id="resetBtn">🔄 重新答题</button>
        <button class="btn btn-primary" id="scrollToTopBtn">↑ 回到顶部</button>
    </div>
    <div class="footer-note">✔ 每答完一题立即显示对错 · 可随时重置重新作答</div>
</div>

<script>
    // ============================================================
    // 经济学 · 全部题目（名词解释/单选/判断/简答/计算/分析）
    // ============================================================
    const questions = [
        // ---------- 名词解释 (4题) ----------
        { id: 'n1', type: '名词解释', question: '需求', answer: '消费者（家庭）在某一特定时期内，在每一个价格水平下愿意并且能够购买的某种商品的数量。简单地说，需求就是有支付能力的购买欲望。', options: [] },
        { id: 'n2', type: '名词解释', question: '机会成本', answer: '对于生产者来说，如果一种生产要素被用于某一特定用途，便意味着他放弃了将这项要素用于其他活动中所能获得的收益，所放弃的收益中最大的收益就是这一特定用途的机会成本。', options: [] },
        { id: 'n3', type: '名词解释', question: '外汇', answer: '外币或外币表示的用于国际结算的支付凭证。', options: [] },
        { id: 'n4', type: '名词解释', question: '通货膨胀', answer: '通货膨胀是一定时期内物价水平全面而持续的上涨。', options: [] },

        // ---------- 单选题 (10题) ----------
        { id: 's1', type: '单选题', question: '微观经济学主要研究', options: ['A. 整个国民经济', 'B. 政府财政政策', 'C. 国际贸易', 'D. 家庭和企业的经济行为'], answer: 'D' },
        { id: 's2', type: '单选题', question: '扶持农产品的支持价格措施', options: ['A. 限制农产品进口', 'B. 补贴消费者', 'C. 收购过剩的农产品', 'D. 提高农业税'], answer: 'C' },
        { id: 's3', type: '单选题', question: '容易被替代的产品需求弹性', options: ['A. 小', 'B. 大', 'C. 无弹性', 'D. 单位弹性'], answer: 'B' },
        { id: 's4', type: '单选题', question: '属于求职性失业', options: ['A. 退休人员', 'B. 被解雇的工人', 'C. 辞职后正在找新工作的人', 'D. 因季节停工的人'], answer: 'C' },
        { id: 's5', type: '单选题', question: '从总收入取回自己要素报酬', options: ['A. 显性成本', 'B. 会计成本', 'C. 隐性成本', 'D. 机会成本'], answer: 'C' },
        { id: 's6', type: '单选题', question: '货币升值对进口收支', options: ['A. 出口增加，进口减少', 'B. 出口增加，进口增加', 'C. 出口减少，进口增加', 'D. 出口减少，进口减少'], answer: 'C' },
        { id: 's7', type: '单选题', question: '富有弹性商品如何获更多收益', options: ['A. 适当降低价格', 'B. 适当提高价格', 'C. 维持价格不变', 'D. 减少供给'], answer: 'A' },
        { id: 's8', type: '单选题', question: '长期的含义', options: ['A. 一年以上', 'B. 五年以上', 'C. 至少一种生产要素固定', 'D. 全部生产要素都可随产量调整的时期'], answer: 'D' },
        { id: 's9', type: '单选题', question: '世界上多数国家采用汇率标价方法', options: ['A. 直接标价', 'B. 间接标价', 'C. 美元标价', 'D. 欧元标价'], answer: 'A' },
        { id: 's10', type: '单选题', question: '一国领土所产最终产品市场价值总和', options: ['A. 国民生产总值（GNP）', 'B. 国内生产总值（GDP）', 'C. 国民收入（NI）', 'D. 个人可支配收入'], answer: 'B' },

        // ---------- 判断题 (10题) ----------
        { id: 'j1', type: '判断题', question: '宏观经济学解决资源利用问题', options: ['正确', '错误'], answer: '正确' },
        { id: 'j2', type: '判断题', question: '需求价格弹性<1时降价使总收益增加', options: ['正确', '错误'], answer: '错误' },
        { id: 'j3', type: '判断题', question: '所有商品需求曲线向右下方倾斜', options: ['正确', '错误'], answer: '正确' },
        { id: 'j4', type: '判断题', question: '中间产品价值可计入GDP', options: ['正确', '错误'], answer: '错误' },
        { id: 'j5', type: '判断题', question: '生活必需品需求弹性比奢侈品小', options: ['正确', '错误'], answer: '正确' },
        { id: 'j6', type: '判断题', question: '任何两条无差异曲线不可能相交', options: ['正确', '错误'], answer: '正确' },
        { id: 'j7', type: '判断题', question: '长期中无所谓固定成本和变动成本', options: ['正确', '错误'], answer: '正确' },
        { id: 'j8', type: '判断题', question: '垄断竞争=产品无差别', options: ['正确', '错误'], answer: '错误' },
        { id: 'j9', type: '判断题', question: '外汇供求影响汇率是直接因素', options: ['正确', '错误'], answer: '正确' },
        { id: 'j10', type: '判断题', question: '应对需求拉动型通胀应增税抑消费', options: ['正确', '错误'], answer: '正确' },

        // ---------- 简答题 (5题) ----------
        { id: 'm1', type: '简答题', question: '无差异曲线及其特征', answer: '无差异曲线表示两种商品不同数量组合给消费者带来相同效用的曲线。特征：①向右下方倾斜；②离原点越远满足程度越高；③任何两条不相交；④通常凸向原点。', options: [] },
        { id: 'm2', type: '简答题', question: '弹性理论对厂商决策的帮助', answer: '①弹性高的产品可适当降价增加收入（薄利多销）；②弹性低的产品可适当提价增加收入；③可根据消费者对价格敏感程度进行市场细分。', options: [] },
        { id: 'm3', type: '简答题', question: 'GDP三种核算方法', answer: '①生产法：GDP = 总产出 − 中间投入；②收入法：GDP = 工资+利息+利润+租金+间接税+折旧+非公司企业主收入；③支出法：GDP = 消费+投资+政府购买+净出口。', options: [] },
        { id: 'm4', type: '简答题', question: '经济发展与经济增长的关系', answer: '经济增长是"量"的概念（产出持续增加）；经济发展是"质"的概念（含结构转换、工业化、现代化、福利改善等）。增长是发展的基础，发展是增长的深化。', options: [] },
        { id: 'm5', type: '简答题', question: '外部性失灵及解决方法', answer: '外部性失灵指因外部性存在导致市场无法实现资源最优配置。解决方法：①庇古税；②政府管制；③外部效应内部化；④产权明晰化。', options: [] },

        // ---------- 计算题 (2题) ----------
        { id: 'c1', type: '计算题', question: '已知需求 P = 100 − 4Q，供给 P = 40 + 2Q，求均衡价格与均衡产量。', answer: '均衡产量 Q = 10，均衡价格 P = 60', options: [] },
        { id: 'c2', type: '计算题', question: 'GDP核算：2019年名义GDP=1700元，2020年名义GDP=2300元。以2019为基期，求2019和2020年实际GDP。', answer: '2019年实际GDP = 1700元；2020年实际GDP = 1750元', options: [] },

        // ---------- 分析题 (1题) ----------
        { id: 'a1', type: '分析题', question: '委内瑞拉恶性通货膨胀分析——请简述其成因与治理措施。', answer: '成因：①需求拉动型；②成本推动型；③混合型；④结构型。治理措施：紧缩性货币政策（降低货币供应量增长率/提高利率/公开市场出售政府债券）；紧缩性财政政策（增加税收/削减政府支出/减少转移支付和社会福利）。', options: [] }
    ];

    // ============================================================
    // 渲染逻辑
    // ============================================================
    const container = document.getElementById('questionsContainer');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const correctCountEl = document.getElementById('correctCount');
    const wrongCountEl = document.getElementById('wrongCount');

    // 存储用户选择答案 (key: questionId, value: 选择的字符串)
    let userAnswers = {};
    // 记录哪些题已显示反馈 (用于重新渲染后恢复)
    let answeredIds = new Set();

    function renderQuestions() {
        container.innerHTML = '';
        questions.forEach((q, index) => {
            const block = document.createElement('div');
            block.className = 'question-block unanswered';
            block.id = `q-${q.id}`;

            const title = document.createElement('div');
            title.className = 'q-title';
            const typeSpan = document.createElement('span');
            typeSpan.className = 'q-type';
            typeSpan.textContent = q.type;
            title.appendChild(typeSpan);
            title.append(` ${index+1}. ${q.question}`);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';

            // 判断题特殊处理：选项显示 "正确" / "错误"
            let optLabels = q.options;
            if (q.type === '判断题' && q.options.length === 0) {
                optLabels = ['正确', '错误'];
            } else if (q.options.length === 0 && q.type !== '判断题') {
                // 名词解释/简答/计算/分析 没有选项，直接显示“参考答案”
                const note = document.createElement('div');
                note.style.cssText = 'padding: 10px 0; color: #3d5a73; background: #ecf6f0; border-radius: 12px; padding: 12px 16px; margin-top: 6px;';
                note.innerHTML = `<strong>📌 参考答案：</strong> ${q.answer}`;
                optionsDiv.appendChild(note);
                // 这类题直接标记为“已答”，不参与选择
                block.classList.remove('unanswered');
                block.classList.add('correct');
                answeredIds.add(q.id);
                // 不添加选项
            } else {
                // 有选项
                optLabels.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = q.id;
                    radio.value = opt;
                    // 恢复之前的选择
                    if (userAnswers[q.id] === opt) {
                        radio.checked = true;
                        label.classList.add('selected');
                    }
                    radio.addEventListener('change', function() {
                        if (this.checked) {
                            handleSelect(q.id, opt);
                        }
                    });
                    label.appendChild(radio);
                    label.append(opt);
                    optionsDiv.appendChild(label);
                });
            }

            // 反馈区
            const feedback = document.createElement('div');
            feedback.className = 'feedback';
            feedback.id = `fb-${q.id}`;
            // 如果已答且有选择，显示反馈
            if (userAnswers[q.id]) {
                const isCorrect = checkAnswer(q.id, userAnswers[q.id]);
                showFeedback(q.id, isCorrect);
            }

            block.appendChild(title);
            block.appendChild(optionsDiv);
            block.appendChild(feedback);
            container.appendChild(block);
        });
        updateProgress();
    }

    function handleSelect(qId, selected) {
        userAnswers[qId] = selected;
        const isCorrect = checkAnswer(qId, selected);
        // 更新UI
        showFeedback(qId, isCorrect);
        // 更新样式
        const block = document.getElementById(`q-${qId}`);
        block.classList.remove('unanswered', 'correct', 'wrong');
        block.classList.add(isCorrect ? 'correct' : 'wrong');

        // 更新选项高亮
        const labels = block.querySelectorAll('.option-label');
        labels.forEach(label => {
            const radio = label.querySelector('input[type="radio"]');
            const optText = label.textContent.trim();
            // 注意：radio的value可能包含字母+点，需匹配
            const val = radio.value;
            label.classList.remove('selected', 'correct-answer', 'wrong-answer');
            if (val === selected) {
                label.classList.add('selected');
                if (isCorrect) label.classList.add('correct-answer');
                else label.classList.add('wrong-answer');
            }
            // 如果是单选题且正确选项，高亮
            const q = questions.find(q => q.id === qId);
            if (q && q.type === '单选题') {
                const correctOpt = q.answer; // 如 'D'
                // 找到对应选项文本
                const correctFull = q.options.find(o => o.startsWith(correctOpt+'.') || o.startsWith(correctOpt+'、'));
                if (correctFull && val === correctFull) {
                    label.classList.add('correct-answer');
                }
            }
        });

        answeredIds.add(qId);
        updateProgress();
    }

    function checkAnswer(qId, selected) {
        const q = questions.find(q => q.id === qId);
        if (!q) return false;
        // 判断题
        if (q.type === '判断题') {
            return selected === q.answer;
        }
        // 单选题
        if (q.type === '单选题') {
            // 选项格式 "A. xxx" 或 "A、xxx"，提取前缀
            const prefix = selected.charAt(0);
            return prefix === q.answer;
        }
        // 其他类型（名词解释/简答/计算/分析）显示参考答案，不判对错
        return true;
    }

    function showFeedback(qId, isCorrect) {
        const q = questions.find(q => q.id === qId);
        const fb = document.getElementById(`fb-${qId}`);
        if (!fb) return;
        // 名词解释/简答/计算/分析 直接显示参考答案
        if (['名词解释','简答','计算题','分析题'].includes(q.type)) {
            fb.className = 'feedback show correct';
            fb.innerHTML = `<strong>📖 参考答案：</strong> ${q.answer}`;
            return;
        }
        // 单选/判断
        fb.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;
        let correctDisplay = '';
        if (!isCorrect) {
            if (q.type === '单选题') {
                const correctOpt = q.options.find(o => o.startsWith(q.answer+'.') || o.startsWith(q.answer+'、'));
                correctDisplay = `<span class="correct-ans">正确答案：${correctOpt || q.answer}</span>`;
            } else if (q.type === '判断题') {
                correctDisplay = `<span class="correct-ans">正确答案：${q.answer}</span>`;
            }
        }
        fb.innerHTML = isCorrect ? '✅ 回答正确！' : `❌ 回答错误。${correctDisplay}`;
    }

    function updateProgress() {
        const total = questions.length;
        const answered = answeredIds.size;
        const pct = total ? (answered / total * 100) : 0;
        progressBar.style.width = `${pct}%`;
        progressText.textContent = `${answered} / ${total} 题`;

        // 统计正确/错误（仅对单选/判断）
        let correct = 0, wrong = 0;
        questions.forEach(q => {
            if (['单选题','判断题'].includes(q.type)) {
                const ans = userAnswers[q.id];
                if (ans) {
                    if (checkAnswer(q.id, ans)) correct++;
                    else wrong++;
                }
            }
        });
        correctCountEl.textContent = `✅ 正确 ${correct}`;
        wrongCountEl.textContent = `❌ 错误 ${wrong}`;
    }

    // 重置
    function resetAll() {
        userAnswers = {};
        answeredIds = new Set();
        // 清空所有radio
        document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
        renderQuestions();
        updateProgress();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 首次渲染
    renderQuestions();

    // 事件绑定
    document.getElementById('resetBtn').addEventListener('click', resetAll);
    document.getElementById('scrollToTopBtn').addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // 对名词解释/简答/计算/分析 直接标记为已阅（不计对错），但用户可查看
    // 已在render中处理
</script>
