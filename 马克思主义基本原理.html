        // ----- 工具函数 -----
        function getPrefix(opt) {
            const m = opt.match(/^([A-Ea-e])[.、]\s*/);
            return m ? m[1].toUpperCase() : null;
        }

        // 单选题判题
        function isSingleCorrect(selected, answer) {
            if (!selected || !answer) return false;
            const sp = getPrefix(selected);
            const ap = getPrefix(answer);
            if (sp && ap) return sp === ap;
            if (sp) return sp === answer;
            return selected === answer;
        }

        // 多选题判题：选中的字母集合 === 正确答案字母集合
        function isMultiCorrect(selectedArray, answer) {
            if (!selectedArray || selectedArray.length === 0 || !answer) return false;
            // 提取每个选项的字母前缀
            const selLetters = selectedArray.map(s => getPrefix(s) || s.trim().charAt(0).toUpperCase()).sort().join('');
            const ansLetters = answer.split('').map(s => s.trim().toUpperCase()).sort().join('');
            return selLetters === ansLetters;
        }

        // 获取完整答案文本
        function getFullAnswer(options, answer) {
            if (!options) return answer;
            for (let o of options) {
                const p = getPrefix(o);
                if (p && p === answer) return o;
                if (o === answer) return o;
            }
            return answer;
        }

            const ansLetters = answer.split('').map(s => s.trim().toUpperCase());

            for (let o of options) {
                const p = getPrefix(o);
                if (p && ansLetters.includes(p)) {
                    result.push(o);
                }
            }

            { id: 'B_m6', paper: 'B', type: '多选题', question: '群众观点', options: ['A. 相信群众', 'B. 自己解放自己', 'C. 全心全意为人民服务', 'D. 向人民负责', 'E. 虚心向群众学习'], answer: 'BCDE' },
            { id: 'B_m7', paper: 'B', type: '多选题', question: '经济全球化负面影响', options: ['A. 经济增长加快', 'B. 地位不平等', 'C. 资源短缺和污染', 'D. 增加经济风险', 'E. 技术进步加速'], answer: 'BDE' },
            { id: 'B_m8', paper: 'B', type: '多选题', question: '金融寡头控制国家机器', options: ['A. 收买高官', 'B. 政策咨询', 'C. 代理人执政', 'D. 聘请前高官', 'E. 控制舆论'], answer: 'ABCDE' },
            { id: 'B_m9', paper: 'B', type: '多选题', question: '意识形态包括', options: ['A. 政治法律思想', 'B. 自然科学', 'C. 宗教', 'D. 艺术', 'E. 哲学'], answer: 'ACE' },
            { id: 'B_m10', paper: 'B', type: '多选题', question: '共产主义社会基本特征', options: ['A. 生产资料公有', 'B. 消灭社会差别', 'C. 阶级消灭', 'D. 国家消亡', 'E. 物质极大丰富'], answer: 'ABCDE' },

            // ---- 简答 3题 ----
            { id: 'B_short1', paper: 'B', type: '简答题', question: '世界的物质统一性原理', answer: '①自然界是物质的；②人类社会本质上是物质的；③人的意识统一于物质；④世界的物质统一性是多样性的统一。这是辩证唯物主义最基本的观点，是马克思主义的基石。', options: [] },
            { id: 'B_short2', paper: 'B', type: '简答题', question: '商品使用价值和价值的关系', answer: '对立统一：对立——二者不可兼得，生产者要价值就必须让渡使用价值；统一——商品必须同时具有二者，使用价值是价值的物质承担者。', options: [] },
            { id: 'B_short3', paper: 'B', type: '简答题', question: '劳动力商品的使用价值和价值特点', answer: '价值：维持劳动者本人、家属生存及教育培训所需生活资料价值，含历史和道德因素。使用价值：是价值的源泉，能创造比自身价值更大的新价值（剩余价值）。', options: [] },

            // ---- 论述 1题 ----
            { id: 'B_essay', paper: 'B', type: '论述题', question: '如何理解资本主义制度？', answer: '要点：①资本主义经济特点（私有制、雇佣劳动、剩余价值剥削）；②政治特点（资产阶级专政、形式民主）；③历史进步性（取代封建制度、推动生产力）；④历史局限性（基本矛盾不可克服、周期性危机）；⑤必然被社会主义取代是人类社会发展规律决定的。', options: [] }
        ];

        // ============================================================
        // 渲染引擎
        // ============================================================
        const container = document.getElementById('questionsContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const correctCountEl = document.getElementById('correctCount');
        const wrongCountEl = document.getElementById('wrongCount');

        let currentFilter = 'all';
        let selections = {}; // 单选存字符串，多选存数组

        function getFiltered() {
            if (currentFilter === 'all') return allQuestions;
            return allQuestions.filter(q => q.paper === currentFilter);
        }

        // 判断某题是否已回答
        function isAnswered(q) {
            if (!q.options || q.options.length === 0) return true; // 简答/论述自动算已答
            const sel = selections[q.id];
            if (q.type === '多选题') {
                return sel && Array.isArray(sel) && sel.length > 0;
            }
            return !!sel;
        }

        // 判断某题是否正确
        function isQuestionCorrect(q) {
            if (!q.options || q.options.length === 0) return true;
            const sel = selections[q.id];
            if (!sel) return false;
            if (q.type === '多选题') {
                return isMultiCorrect(sel, q.answer);
            }
            return isSingleCorrect(sel, q.answer);
        }

        function render() {
            const list = getFiltered();
            container.innerHTML = '';
            list.forEach((q, idx) => {
                const block = document.createElement('div');
                block.className = 'question-block unanswered';
                block.id = `q-${q.id}`;

                const title = document.createElement('div');
                title.className = 'q-title';
                const typeSpan = document.createElement('span');
                typeSpan.className = 'q-type';
                typeSpan.textContent = q.type;
                title.appendChild(typeSpan);
                title.innerHTML += ` ${idx+1}. ${q.question}`;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';

                // 无选项（简答/论述）
                if (!q.options || q.options.length === 0) {
                    const note = document.createElement('div');
                    note.className = 'writing-hint';
                    note.innerHTML = `<strong>📖 参考答案：</strong>${q.answer}`;
                    optionsDiv.appendChild(note);
                    block.classList.remove('unanswered');
                    block.classList.add('correct');
                } else {
                    const isMulti = q.type === '多选题';
                    q.options.forEach(opt => {
                        const label = document.createElement('label');
                        label.className = 'option-label';
                        const input = document.createElement('input');
                        input.type = isMulti ? 'checkbox' : 'radio';
                        input.name = q.id;
                        input.value = opt;
                        // 恢复选择
                        const sel = selections[q.id];
                        if (sel) {
                            if (isMulti && Array.isArray(sel) && sel.includes(opt)) {
                                input.checked = true;
                                label.classList.add('selected');
                            } else if (!isMulti && sel === opt) {
                                input.checked = true;
                                label.classList.add('selected');
                            }
                        }
                        input.addEventListener('change', function() {
                            if (isMulti) {
                                if (!selections[q.id] || !Array.isArray(selections[q.id])) {
                                    selections[q.id] = [];
                                }
                                if (this.checked) {
                                    if (!selections[q.id].includes(opt)) selections[q.id].push(opt);
                                } else {
                                    selections[q.id] = selections[q.id].filter(s => s !== opt);
                                }
                                if (selections[q.id].length === 0) delete selections[q.id];
                                updateQuestionState(q.id);
                            } else {
                                if (this.checked) {
                                    selections[q.id] = opt;
                                    updateQuestionState(q.id);
                                }
                            }
                        });
                        label.appendChild(input);
                        label.append(opt);
                        optionsDiv.appendChild(label);
                    });
                }

                const feedback = document.createElement('div');
                feedback.className = 'feedback';
                feedback.id = `fb-${q.id}`;
                if (isAnswered(q) && q.options && q.options.length > 0) {
                    const ok = isQuestionCorrect(q);
                    showFeedback(q.id, ok);
                }

                block.appendChild(title);
                block.appendChild(optionsDiv);
                block.appendChild(feedback);
                container.appendChild(block);
            });
            updateProgress();
        }

        function updateQuestionState(qId) {
            const q = allQuestions.find(q => q.id === qId);
            if (!q) return;
            const ok = isQuestionCorrect(q);
            showFeedback(qId, ok);

            const block = document.getElementById(`q-${qId}`);
            block.classList.remove('unanswered', 'correct', 'wrong');
            block.classList.add(ok ? 'correct' : 'wrong');

            // 高亮选项
            const labels = block.querySelectorAll('.option-label');
            const isMulti = q.type === '多选题';
            const sel = selections[q.id];
            labels.forEach(label => {
                const input = label.querySelector('input');
                const val = input.value;
                label.classList.remove('selected', 'correct-answer', 'wrong-answer');
                if (input.checked) label.classList.add('selected');
                // 高亮正确答案
                if (q.options) {
                    if (isMulti) {
                        const ansLetters = q.answer.split('').map(s => s.trim().toUpperCase());
                        const p = getPrefix(val);
                        if (p && ansLetters.includes(p)) {
                            label.classList.add('correct-answer');
                        }
                    } else {
                        const full = getFullAnswer(q.options, q.answer);
                        if (full && val === full) label.classList.add('correct-answer');
                        if (getPrefix(val) && getPrefix(val) === q.answer) label.classList.add('correct-answer');
                    }
                }
            });
            updateProgress();
        }

        function showFeedback(qId, ok) {
            const q = allQuestions.find(q => q.id === qId);
            const fb = document.getElementById(`fb-${qId}`);
            if (!fb || !q || !q.options || q.options.length === 0) return;
            fb.className = `feedback show ${ok ? 'correct' : 'wrong'}`;
            let extra = '';
            if (!ok) {
                if (q.type === '多选题') {
                    const full = getFullMultiAnswer(q.options, q.answer);
                    extra = `<span class="correct-ans">正确答案：${full}</span>`;
                } else {
                    const full = getFullAnswer(q.options, q.answer);
                    extra = `<span class="correct-ans">正确答案：${full}</span>`;
                }
            }
            fb.innerHTML = ok ? '✅ 回答正确！' : `❌ 回答错误。${extra}`;
        }

        function updateProgress() {
            const list = getFiltered();
            let total = list.length;
            let answered = 0;
            list.forEach(q => {
                if (isAnswered(q)) answered++;
            });
            const pct = total ? (answered / total * 100) : 0;
            progressBar.style.width = `${pct}%`;
            progressText.textContent = `${answered} / ${total} 题`;

            let correct = 0,
                wrong = 0;
            list.forEach(q => {
                if (q.options && q.options.length > 0 && isAnswered(q)) {
                    if (isQuestionCorrect(q)) correct++;
                    else wrong++;
                }
            });
            correctCountEl.textContent = `✅ 正确 ${correct}`;
            wrongCountEl.textContent = `❌ 错误 ${wrong}`;
        }

        function resetAll() {
            selections = {};
            document.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(r => r.checked = false);
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.querySelectorAll('.tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.paper;
                selections = {};
                render();
            });
        });

        render();
        document.getElementById('resetBtn').addEventListener('click', resetAll);
        document.getElementById('scrollToTopBtn').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
