        function getPrefix(opt) {
            const m = opt.match(/^([A-Da-d])[.、]\s*/);
            return m ? m[1].toUpperCase() : null;
        }

        function isCorrect(selected, answer) {
            if (!selected || !answer) return false;
            const sp = getPrefix(selected);
            const ap = getPrefix(answer);
            if (sp && ap) return sp === ap;
            if (sp) return sp === answer;
            return selected === answer;
        }

        function getFullAnswer(options, answer) {
            if (!options) return answer;
            for (let o of options) {
                if (isCorrect(o, answer)) return o;
                if (o === answer) return o;
            }
            return answer;
        }

            { id: '2_m6', paper: '2', type: '多选题', question: '中国特色社会主义政治制度', options: ['A. 把握历史传承', 'B. 着眼现实问题', 'C. 形式内容有机统一', 'D. 中国特色民族特色时代特色', 'E. 借鉴西方政治制度'], answer: 'ABCD' },
            { id: '2_m7', paper: '2', type: '多选题', question: '文化繁荣兴盛是', options: ['A. 民族复兴必然要求', 'B. 现代化强国应有之义', 'C. 满足美好生活需要', 'D. 在世界文化激荡中站稳脚跟', 'E. 提升国际影响力的途径'], answer: 'ABCD' },

            // ---- 填空 7题 ----
            { id: '2_f1', paper: '2', type: '填空题', question: '党的基本路线是国家的______、人民的______', answer: '生命线；幸福线', options: [] },
            { id: '2_f2', paper: '2', type: '填空题', question: '中国梦=______、______、人民幸福', answer: '国家富强；民族振兴', options: [] },
            { id: '2_f3', paper: '2', type: '填空题', question: '______是党的根本政治立场', answer: '人民立场', options: [] },
            { id: '2_f4', paper: '2', type: '填空题', question: '公有制经济和______都是重要基础', answer: '非公有制经济', options: [] },
            { id: '2_f5', paper: '2', type: '填空题', question: '全面依法治国走______道路', answer: '中国特色社会主义法治', options: [] },
            { id: '2_f6', paper: '2', type: '填空题', question: '建设______是重要目标', answer: '美丽中国', options: [] },
            { id: '2_f7', paper: '2', type: '填空题', question: '总体国家安全观以______为宗旨', answer: '人民安全', options: [] },

            // ---- 判断 6题 ----
            { id: '2_j1', paper: '2', type: '判断题', question: '独立自主是立党立国重要原则', options: ['正确', '错误'], answer: '正确' },
            { id: '2_j2', paper: '2', type: '判断题', question: '中国共产党根基在人民血脉在人民力量在人民', options: ['正确', '错误'], answer: '正确' },
            { id: '2_j3', paper: '2', type: '判断题', question: '中国对外开放不是独角戏', options: ['正确', '错误'], answer: '正确' },
            { id: '2_j4', paper: '2', type: '判断题', question: '科技创新是百年变局关键变量', options: ['正确', '错误'], answer: '正确' },
            { id: '2_j5', paper: '2', type: '判断题', question: '人民民主是社会主义的生命', options: ['正确', '错误'], answer: '正确' },
            { id: '2_j6', paper: '2', type: '判断题', question: '新时代强军目标', options: ['正确', '错误'], answer: '正确' },

            // ---- 简答 5题 ----
            { id: '2_short1', paper: '2', type: '简答题', question: '中国式现代化的中国特色', answer: 'A. 人口规模巨大；B. 全体人民共同富裕；C. 物质与精神文明协调；D. 人与自然和谐共生；E. 走和平发展道路', options: [] },
            { id: '2_short2', paper: '2', type: '简答题', question: '理解"江山就是人民、人民就是江山"', answer: 'A. 闪耀历史唯物主义真理光芒；B. 充分说明国体政体的人民性；C. 人民是生命之根执政之基力量之源；D. 由党的性质和宗旨决定', options: [] },
            { id: '2_short3', paper: '2', type: '简答题', question: '如何理解新发展阶段', answer: 'A. 社会主义初级阶段重要阶段；B. 从站起来富起来到强起来；C. 向第二个百年目标进军；D. 决胜全面小康社会阶段', options: [] },
            { id: '2_short4', paper: '2', type: '简答题', question: '如何理解全面依法治国', answer: 'A. 国家治理深刻革命；B. 完善中国特色社会主义制度的重要方面；C. 坚持和发展中国特色社会主义的本质要求和重要保障；D. "四个全面"战略布局之一', options: [] },
            { id: '2_short5', paper: '2', type: '简答题', question: '如何理解增进民生福祉', answer: 'A. 立党为公执政为民的本质要求；B. 社会主义生产根本目的；C. 全面建设社会主义现代化国家的应有之义；D. 社会主义和资本主义的根本区别之一', options: [] },

            // ---- 问答 1题 ----
            { id: '2_essay', paper: '2', type: '问答题', question: '怎样增强人民获得感、幸福感、安全感？', answer: '①抓住人民最关心最直接最现实的利益问题，在幼有所育、学有所教、劳有所得、病有所医、老有所养、住有所居、弱有所扶上持续用力；②把人民群众小事当大事，从关心的事做起，从满意的事做起；③民生改善从低层次到高层次、从不均衡到均衡；④根据经济发展和财力状况逐步提高，做现实条件下可以做到的事。', options: [] }
        ];

        // ============================================================
        const container = document.getElementById('questionsContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const correctCountEl = document.getElementById('correctCount');
        const wrongCountEl = document.getElementById('wrongCount');

        let currentFilter = 'all';
        let selections = {};

        function getFiltered() {
            if (currentFilter === 'all') return allQuestions;
            return allQuestions.filter(q => q.paper === currentFilter);
        }

        function render() {
            const list = getFiltered();
            container.innerHTML = '';
            list.forEach((q, idx) => {
                const block = document.createElement('div');
                block.className = 'question-block unanswered';
                block.id = `q-${q.id}`;

                const title = document.createElement('div');
                title.className = 'q-title';
                const typeSpan = document.createElement('span');
                typeSpan.className = 'q-type';
                typeSpan.textContent = q.type;
                title.appendChild(typeSpan);
                title.innerHTML += ` ${idx+1}. ${q.question}`;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';

                if (!q.options || q.options.length === 0) {
                    const note = document.createElement('div');
                    note.className = 'writing-hint';
                    note.innerHTML = `<strong>📖 参考答案：</strong>${q.answer}`;
                    optionsDiv.appendChild(note);
                    block.classList.remove('unanswered');
                    block.classList.add('correct');
                } else {
                    // 多选题用 checkbox
                    const isMulti = q.type === '多选题';
                    q.options.forEach(opt => {
                        const label = document.createElement('label');
                        label.className = 'option-label';
                        const input = document.createElement('input');
                        input.type = isMulti ? 'checkbox' : 'radio';
                        input.name = q.id;
                        input.value = opt;
                        if (selections[q.id] && selections[q.id].includes(opt)) {
                            input.checked = true;
                            label.classList.add('selected');
                        }
                        input.addEventListener('change', function() {
                            if (isMulti) {
                                if (!selections[q.id]) selections[q.id] = [];
                                if (this.checked) {
                                    if (!selections[q.id].includes(opt)) selections[q.id].push(opt);
                                } else {
                                    selections[q.id] = selections[q.id].filter(s => s !== opt);
                                }
                                if (selections[q.id].length === 0) delete selections[q.id];
                                handleMultiSelect(q.id);
                            } else {
                                if (this.checked) handleSelect(q.id, opt);
                            }
                        });
                        label.appendChild(input);
                        label.append(opt);
                        optionsDiv.appendChild(label);
                    });
                }

                const feedback = document.createElement('div');
                feedback.className = 'feedback';
                feedback.id = `fb-${q.id}`;
                if (selections[q.id] && q.options && q.options.length > 0) {
                    const ok = q.type === '多选题' ?
                        isMultiCorrect(selections[q.id].join(','), q.answer) :
                        isCorrect(selections[q.id], q.answer);
                    showFeedback(q.id, ok);
                }

                block.appendChild(title);
                block.appendChild(optionsDiv);
                block.appendChild(feedback);
                container.appendChild(block);
            });
            updateProgress();
        }

        function handleSelect(qId, selected) {
            selections[qId] = selected;
            const q = allQuestions.find(q => q.id === qId);
            const ok = isCorrect(selected, q.answer);
            showFeedback(qId, ok);
            updateBlockStyle(qId, ok);
            updateProgress();
        }

        function handleMultiSelect(qId) {
            const q = allQuestions.find(q => q.id === qId);
            const sel = selections[qId] || [];
            const ok = isMultiCorrect(sel.join(','), q.answer);
            showFeedback(qId, ok);
            updateBlockStyle(qId, ok);
            updateProgress();
        }

        function updateBlockStyle(qId, ok) {
            const block = document.getElementById(`q-${qId}`);
            block.classList.remove('unanswered', 'correct', 'wrong');
            block.classList.add(ok ? 'correct' : 'wrong');
            const labels = block.querySelectorAll('.option-label');
            const q = allQuestions.find(q => q.id === qId);
            labels.forEach(label => {
                const input = label.querySelector('input');
                const val = input.value;
                label.classList.remove('selected', 'correct-answer', 'wrong-answer');
                if (input.checked) label.classList.add('selected');
                if (q && q.options) {
                    const full = getFullAnswer(q.options, q.answer);
                    if (full && val === full) label.classList.add('correct-answer');
                    if (getPrefix(val) && getPrefix(val) === q.answer) label.classList.add('correct-answer');
                }
            });
        }

        function showFeedback(qId, ok) {
            const q = allQuestions.find(q => q.id === qId);
            const fb = document.getElementById(`fb-${qId}`);
            if (!fb || !q || !q.options || q.options.length === 0) return;
            fb.className = `feedback show ${ok ? 'correct' : 'wrong'}`;
            let extra = '';
            if (!ok) {
                const full = getFullAnswer(q.options, q.answer);
                extra = `<span class="correct-ans">正确答案：${full}</span>`;
            }
            fb.innerHTML = ok ? '✅ 回答正确！' : `❌ 回答错误。${extra}`;
        }

        function updateProgress() {
            const list = getFiltered();
            let total = list.length;
            let answered = 0;
            list.forEach(q => {
                if (q.options && q.options.length > 0) {
                    if (selections[q.id] && (Array.isArray(selections[q.id]) ? selections[q.id].length > 0 : true)) answered++;
                } else {
                    answered++;
                }
            });
            const pct = total ? (answered / total * 100) : 0;
            progressBar.style.width = `${pct}%`;
            progressText.textContent = `${answered} / ${total} 题`;

            let correct = 0,
                wrong = 0;
            list.forEach(q => {
                if (q.options && q.options.length > 0 && selections[q.id]) {
                    const ok = q.type === '多选题' ?
                        isMultiCorrect(selections[q.id].join(','), q.answer) :
                        isCorrect(selections[q.id], q.answer);
                    if (ok) correct++;
                    else wrong++;
                }
            });
            correctCountEl.textContent = `✅ 正确 ${correct}`;
            wrongCountEl.textContent = `❌ 错误 ${wrong}`;
        }

        function resetAll() {
            selections = {};
            document.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(r => r.checked = false);
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.querySelectorAll('.tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.paper;
                selections = {};
                render();
            });
        });

        render();
        document.getElementById('resetBtn').addEventListener('click', resetAll);
        document.getElementById('scrollToTopBtn').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
