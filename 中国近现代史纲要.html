        function getPrefix(opt) {
            const m = opt.match(/^([A-Da-d])[.、]\s*/);
            return m ? m[1].toUpperCase() : null;
        }

        function isCorrect(selected, answer) {
            if (!selected || !answer) return false;
            const sp = getPrefix(selected);
            const ap = getPrefix(answer);
            if (sp && ap) return sp === ap;
            if (sp) return sp === answer;
            return selected === answer;
        }

        function getFullAnswer(options, answer) {
            if (!options) return answer;
            for (let o of options) {
                if (isCorrect(o, answer)) return o;
                if (o === answer) return o;
            }
            return answer;
        }

        function isMultiCorrect(selected, answer) {
            if (!selected || !answer) return false;
            const selLetters = selected.split(',').map(s => s.trim().charAt(0).toUpperCase()).sort().join('');
            const ansLetters = answer.split('').map(s => s.trim().toUpperCase()).sort().join('');

            { id: 'C_m7', paper: 'C', type: '多选题', question: '过渡时期经济成分', options: ['A. 国营经济', 'B. 合作社经济', 'C. 个体经济', 'D. 私人资本主义经济', 'E. 国家资本主义经济'], answer: 'ABCDE' },
            { id: 'C_m8', paper: 'C', type: '多选题', question: '邓小平南方谈话', options: ['A. 改革也是解放生产力', 'B. 计划≠社会主义', 'C. 市场≠资本主义', 'D. 科技是第一生产力', 'E. 发展才是硬道理'], answer: 'ABCDE' },

            { id: 'C_m10', paper: 'C', type: '多选题', question: '1978年至今的成就', options: ['A. 实现民族独立', 'B. 经济总量世界第二', 'C. 城镇化率提高', 'D. 高精尖领域进展', 'E. 全面建成小康社会'], answer: 'BCD' },

            // ---- 判断 10题 ----

            { id: 'C_j2', paper: 'C', type: '判断题', question: '清末新政是维新运动的继续', options: ['正确', '错误'], answer: '错误' },
            { id: 'C_j3', paper: 'C', type: '判断题', question: '辛亥革命失败=不能完成反帝反封建使命', options: ['正确', '错误'], answer: '正确' },
            { id: 'C_j4', paper: 'C', type: '判断题', question: '洋务派口号是"民主"与"科学"', options: ['正确', '错误'], answer: '错误' },
            { id: 'C_j5', paper: 'C', type: '判断题', question: '建军节标志=秋收起义', options: ['正确', '错误'], answer: '错误' },
            { id: 'C_j6', paper: 'C', type: '判断题', question: '抗日民族统一战线是抗战胜利决定性因素', options: ['正确', '错误'], answer: '正确' },
            { id: 'C_j7', paper: 'C', type: '判断题', question: '持久战战略思想是纲领性文献', options: ['正确', '错误'], answer: '正确' },
            { id: 'C_j8', paper: 'C', type: '判断题', question: '五四运动反帝反封建彻底性', options: ['正确', '错误'], answer: '正确' },
            { id: 'C_j9', paper: 'C', type: '判断题', question: '辛亥革命后走上资本主义道路', options: ['正确', '错误'], answer: '错误' },
            { id: 'C_j10', paper: 'C', type: '判断题', question: '人民代表大会制度是根本政治制度', options: ['正确', '错误'], answer: '正确' },

            // ---- 论述 2题 ----
            { id: 'C_essay1', paper: 'C', type: '论述题', question: '怎样理解党团结和带领全国各族人民为民族复兴而努力奋斗的意义？', answer: '【要点】①党的初心使命：为中国人民谋幸福、为中华民族谋复兴；②历史脉络：从站起来、富起来到强起来的伟大飞跃；③人民主体地位：党的根基在人民、血脉在人民、力量在人民；④现实意义：团结奋斗是实现民族复兴的必由之路。', options: [] },
            { id: 'C_essay2', paper: 'C', type: '论述题', question: '怎样理解中国特色社会主义进入新时代的意义？', answer: '【要点】①社会主要矛盾转化：人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾；②新的历史方位：中华民族迎来了从站起来、富起来到强起来的伟大飞跃；③全面建设社会主义现代化国家新征程开启；④中国特色社会主义道路、理论、制度、文化不断发展，为解决人类问题贡献了中国智慧和中国方案。', options: [] }
        ];

        // ============================================================
        const container = document.getElementById('questionsContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const correctCountEl = document.getElementById('correctCount');
        const wrongCountEl = document.getElementById('wrongCount');

        let currentFilter = 'all';
        let selections = {};

        function getFiltered() {
            if (currentFilter === 'all') return allQuestions;
            return allQuestions.filter(q => q.paper === currentFilter);
        }

        function render() {
            const list = getFiltered();
            container.innerHTML = '';
            list.forEach((q, idx) => {
                const block = document.createElement('div');
                block.className = 'question-block unanswered';
                block.id = `q-${q.id}`;

                const title = document.createElement('div');
                title.className = 'q-title';
                const typeSpan = document.createElement('span');
                typeSpan.className = 'q-type';
                typeSpan.textContent = q.type;
                title.appendChild(typeSpan);
                title.innerHTML += ` ${idx+1}. ${q.question}`;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';

                if (!q.options || q.options.length === 0) {
                    const note = document.createElement('div');
                    note.className = 'writing-hint';
                    note.innerHTML = `<strong>📖 参考答案：</strong>${q.answer}`;
                    optionsDiv.appendChild(note);
                    block.classList.remove('unanswered');
                    block.classList.add('correct');
                } else {
                    const isMulti = q.type === '多选题';
                    q.options.forEach(opt => {
                        const label = document.createElement('label');
                        label.className = 'option-label';
                        const input = document.createElement('input');
                        input.type = isMulti ? 'checkbox' : 'radio';
                        input.name = q.id;
                        input.value = opt;
                        if (selections[q.id] && selections[q.id].includes(opt)) {
                            input.checked = true;
                            label.classList.add('selected');
                        }
                        input.addEventListener('change', function() {
                            if (isMulti) {
                                if (!selections[q.id]) selections[q.id] = [];
                                if (this.checked) {
                                    if (!selections[q.id].includes(opt)) selections[q.id].push(opt);
                                } else {
                                    selections[q.id] = selections[q.id].filter(s => s !== opt);
                                }
                                if (selections[q.id].length === 0) delete selections[q.id];
                                handleMultiSelect(q.id);
                            } else {
                                if (this.checked) handleSelect(q.id, opt);
                            }
                        });
                        label.appendChild(input);
                        label.append(opt);
                        optionsDiv.appendChild(label);
                    });
                }

                const feedback = document.createElement('div');
                feedback.className = 'feedback';
                feedback.id = `fb-${q.id}`;
                if (selections[q.id] && q.options && q.options.length > 0) {
                    const ok = q.type === '多选题' ?
                        isMultiCorrect(selections[q.id].join(','), q.answer) :
                        isCorrect(selections[q.id], q.answer);
                    showFeedback(q.id, ok);
                }

                block.appendChild(title);
                block.appendChild(optionsDiv);
                block.appendChild(feedback);
                container.appendChild(block);
            });
            updateProgress();
        }

        function handleSelect(qId, selected) {
            selections[qId] = selected;
            const q = allQuestions.find(q => q.id === qId);
            const ok = isCorrect(selected, q.answer);
            showFeedback(qId, ok);
            updateBlockStyle(qId, ok);
            updateProgress();
        }

        function handleMultiSelect(qId) {
            const q = allQuestions.find(q => q.id === qId);
            const sel = selections[qId] || [];
            const ok = isMultiCorrect(sel.join(','), q.answer);
            showFeedback(qId, ok);
            updateBlockStyle(qId, ok);
            updateProgress();
        }

        function updateBlockStyle(qId, ok) {
            const block = document.getElementById(`q-${qId}`);
            block.classList.remove('unanswered', 'correct', 'wrong');
            block.classList.add(ok ? 'correct' : 'wrong');
            const labels = block.querySelectorAll('.option-label');
            const q = allQuestions.find(q => q.id === qId);
            labels.forEach(label => {
                const input = label.querySelector('input');
                const val = input.value;
                label.classList.remove('selected', 'correct-answer', 'wrong-answer');
                if (input.checked) label.classList.add('selected');
                if (q && q.options) {
                    const full = getFullAnswer(q.options, q.answer);
                    if (full && val === full) label.classList.add('correct-answer');
                    if (getPrefix(val) && getPrefix(val) === q.answer) label.classList.add('correct-answer');
                }
            });
        }

        function showFeedback(qId, ok) {
            const q = allQuestions.find(q => q.id === qId);
            const fb = document.getElementById(`fb-${qId}`);
            if (!fb || !q || !q.options || q.options.length === 0) return;
            fb.className = `feedback show ${ok ? 'correct' : 'wrong'}`;
            let extra = '';
            if (!ok) {
                const full = getFullAnswer(q.options, q.answer);
                extra = `<span class="correct-ans">正确答案：${full}</span>`;
            }
            fb.innerHTML = ok ? '✅ 回答正确！' : `❌ 回答错误。${extra}`;
        }

        function updateProgress() {
            const list = getFiltered();
            let total = list.length;
            let answered = 0;
            list.forEach(q => {
                if (q.options && q.options.length > 0) {
                    if (selections[q.id] && (Array.isArray(selections[q.id]) ? selections[q.id].length > 0 : true)) answered++;
                } else {
                    answered++;
                }
            });
            const pct = total ? (answered / total * 100) : 0;
            progressBar.style.width = `${pct}%`;
            progressText.textContent = `${answered} / ${total} 题`;

            let correct = 0,
                wrong = 0;
            list.forEach(q => {
                if (q.options && q.options.length > 0 && selections[q.id]) {
                    const ok = q.type === '多选题' ?
                        isMultiCorrect(selections[q.id].join(','), q.answer) :
                        isCorrect(selections[q.id], q.answer);
                    if (ok) correct++;
                    else wrong++;
                }
            });
            correctCountEl.textContent = `✅ 正确 ${correct}`;
            wrongCountEl.textContent = `❌ 错误 ${wrong}`;
        }

        function resetAll() {
            selections = {};
            document.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(r => r.checked = false);
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.querySelectorAll('.tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.paper;
                selections = {};
                render();
            });
        });

        render();
        document.getElementById('resetBtn').addEventListener('click', resetAll);
        document.getElementById('scrollToTopBtn').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
